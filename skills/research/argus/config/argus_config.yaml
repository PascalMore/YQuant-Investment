# skills/research/argus/config/argus_config.yaml
# Argus main configuration

# Credibility scoring thresholds
credibility:
  high_threshold: 0.8
  medium_threshold: 0.6
  low_threshold: 0.4

# Signal confidence thresholds
signal:
  high_confidence: 0.7
  medium_confidence: 0.5
  low_confidence: 0.3

bayesian_scoring:
  weights:
    rebalancing_score: 0.30
    product_credibility: 0.25
    consensus_score: 0.25
    direction_score: 0.20

# Pool zones
pool_zones:
  conviction:
    min_confidence: 0.75
    min_contributing_products: 3
  candidate:
    min_confidence: 0.60
    min_contributing_products: 2
  watch:
    min_confidence: 0.45
  scan:
    min_confidence: 0.30

# Portfolio stock pool automatic zone transition thresholds
zone_thresholds:
  scan_to_watch:
    bayesian_min: 0.30
    product_count_min: 2
  watch_to_candidate:
    bayesian_min: 0.50
    consensus_min: 0.40
  candidate_to_conviction:
    bayesian_min: 0.70
    product_count_min: 3
    crowding_max: "DANGER"

# Rebalancing detection
rebalancing:
  holding_ratio_change_threshold: 0.05  # 5% change threshold
  lookback_days: 5

# Darwin moment detection (Phase 4B)
darwin:
  drawdown_threshold: 0.10    # 行业20日跌幅 >= 10% 触发
  systemic_threshold: 0.08    # 沪深300同期跌幅 > 8% 时降权
  weak_threshold: 0.50        # 弱手 cred < 0.5
  strong_threshold: 0.65      # 强手 cred > 0.65（原为 0.70，降低以增加 Darwin 触发灵敏度）
  min_strong_add: 2           # 至少2个强手 hold/add

# C8 four-layer crowding analysis
crowding:
  default_macro_score: 0.5
  level_thresholds:
    low: 0.35
    high: 0.70
  layer_weights:
    L1: 0.20  # macro liquidity
    L2: 0.25  # sector crowding / rotation
    L3: 0.35  # micro position concentration / turnover
    L4: 0.20  # event-driven consensus

# Industry weight aggregation
industry_weight:
  sector_info_collection: stock_sector_info
  classify_system: SW
  unknown_sw1_code: UNKNOWN
  unknown_sw1_name: 未映射

# Industry groups for Prosperity Gauge (Phase 4C)
industry_groups:
  cyclical:
    - code: "801050.SI"
      name: "有色金属"
    - code: "801040.SI"
      name: "钢铁"
    - code: "801030.SI"
      name: "基础化工"
    - code: "801890.SI"
      name: "机械设备"
    - code: "801880.SI"
      name: "汽车"
  defensive:
    - code: "801120.SI"
      name: "食品饮料"
    - code: "801150.SI"
      name: "医药生物"
    - code: "801160.SI"
      name: "公用事业"
    - code: "801780.SI"
      name: "银行"

# Prosperity Gauge thresholds (Phase 4C)
prosperity:
  bullish_threshold: 2.0     # prosperity_delta > +2pp → BULLISH
  defensive_threshold: -2.0    # prosperity_delta < -2pp → DEFENSIVE

# MongoDB output collections for Argus Phase 4
output_collections:
  credential_score: 08_research_argus_credential_score
  signal: 08_research_argus_signal
  signal_pool: 08_research_argus_signal_pool
  industry_weight: 08_research_argus_industry_weight
  darwin_event: 08_research_argus_darwin_event
  consensus_direction: 08_research_argus_consensus_direction

mongo:
  database: tradingagents
  collections:
    credential_score: 08_research_argus_credential_score
    signal: 08_research_argus_signal
    signal_pool: 08_research_argus_signal_pool
    industry_weight: 08_research_argus_industry_weight
    darwin_event: 08_research_argus_darwin_event
    consensus_direction: 08_research_argus_consensus_direction
    sector_info: stock_sector_info
    index_quotes: index_daily_quotes
